<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#13151a;color:#e2e2e2;font-family:'DM Mono','Courier New',monospace;overflow-x:hidden}
  ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#1a1d24}::-webkit-scrollbar-thumb{background:#3a3d45;border-radius:3px}
  .tile-btn{transition:all 0.15s ease;cursor:pointer;border:none;outline:none}
  .tile-btn:not(:disabled):hover{transform:scale(1.08)!important;border-color:#CC0000!important;box-shadow:0 0 20px rgba(204,0,0,0.55)!important;background:#2e2020!important}
  .tile-btn:disabled{cursor:default}
  .btn-red{transition:all 0.15s;cursor:pointer}
  .btn-red:not(:disabled):hover{background:#e60000!important;transform:translateY(-1px);box-shadow:0 6px 24px rgba(204,0,0,0.45)!important}
  .btn-gold{transition:all 0.15s;cursor:pointer}
  .btn-gold:not(:disabled):hover{background:#e6c23a!important;transform:translateY(-1px);box-shadow:0 4px 20px rgba(212,175,55,0.45)!important}
  .nav-item{transition:all 0.15s;cursor:pointer;background:none;border:none;outline:none}
  .nav-item:hover{color:#fff!important}
  .reward-card{transition:all 0.2s}
  .reward-card:hover{border-color:#444!important;background:#1e2028!important;transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.4)!important}
  .lb-row{transition:background 0.15s}
  .lb-row:hover{background:#1e2028!important}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes bombShake{0%,100%{transform:translateX(0) scale(1)}15%{transform:translateX(-6px) scale(1.05)}30%{transform:translateX(6px)}45%{transform:translateX(-4px)}60%{transform:translateX(4px)}75%{transform:translateX(-2px)}}
  @keyframes safeReveal{0%{transform:scale(0.8);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
  @keyframes glowPulse{0%,100%{box-shadow:0 0 8px rgba(204,0,0,0.4)}50%{box-shadow:0 0 22px rgba(204,0,0,0.8)}}
  @keyframes goldPulse{0%,100%{box-shadow:0 0 10px rgba(212,175,55,0.4)}50%{box-shadow:0 0 28px rgba(212,175,55,0.8)}}
  @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes deathReveal{0%{opacity:0;transform:scale(0.5)}50%{transform:scale(1.1)}100%{opacity:1;transform:scale(1)}}
  .active-row-glow{animation:glowPulse 2s ease infinite}
  .death-box-glow{animation:goldPulse 2s ease infinite}
  /* ── MOBILE ── */
  @media (max-width: 700px) {
    .desktop-sidebar { display:none!important; }
    .mobile-bottom-bar { display:none!important; }
    .mobile-action-bar { display:flex!important; }
    .game-layout { height:100%!important; overflow:hidden!important; }
    .main-board { flex:1!important; overflow:hidden!important; display:flex!important; flex-direction:column!important; }
    .board-inner { flex:1!important; }
    .header-nav { display:none!important; }
    .mobile-tabs { display:flex!important; gap:4px; }
    .shop-grid { grid-template-columns:1fr!important; gap:12px!important; }
    .shop-grid .reward-card { display:flex!important; flex-direction:row!important; }
    .shop-grid .reward-card .card-image { width:100px!important; height:auto!important; min-height:80px!important; flex-shrink:0!important; border-bottom:none!important; border-right:1px solid #2a2d36!important; }
    .shop-grid .reward-card .card-body { flex:1!important; padding:12px!important; }
  }
  .mobile-bottom-bar { display:none; position:fixed; bottom:0; left:0; right:0; background:#13151a; border-top:1px solid #2a2d36; z-index:45; padding:10px 16px; gap:12px; align-items:center; }
</style>

// ─── AUDIO ────────────────────────────────────────────────────────────────────
function playSound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const gain = ctx.createGain();
    gain.connect(ctx.destination);
    if (type === 'safe') {
      // Short bright ping
      const osc = ctx.createOscillator();
      osc.connect(gain);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(520, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.12);
      gain.gain.setValueAtTime(0.25, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.25);
    } else if (type === 'cashout') {
      // Ascending success chord
      [440,554,659].forEach((freq,i) => {
        const osc = ctx.createOscillator();
        const g2 = ctx.createGain();
        osc.connect(g2); g2.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = freq;
        g2.gain.setValueAtTime(0.0, ctx.currentTime + i*0.07);
        g2.gain.linearRampToValueAtTime(0.18, ctx.currentTime + i*0.07 + 0.05);
        g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.07 + 0.4);
        osc.start(ctx.currentTime + i*0.07);
        osc.stop(ctx.currentTime + i*0.07 + 0.5);
      });
    } else if (type === 'bomb') {
      // Deep thud + distortion rumble
      const buf = ctx.createBuffer(1, ctx.sampleRate * 0.6, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);
      const src = ctx.createBufferSource();
      src.buffer = buf;
      const filter = ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 180;
      src.connect(filter); filter.connect(gain);
      gain.gain.setValueAtTime(0.8, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
      src.start();
      // Also add a low thump oscillator
      const osc2 = ctx.createOscillator();
      const g3 = ctx.createGain();
      osc2.connect(g3); g3.connect(ctx.destination);
      osc2.type = 'sine';
      osc2.frequency.setValueAtTime(80, ctx.currentTime);
      osc2.frequency.exponentialRampToValueAtTime(30, ctx.currentTime + 0.4);
      g3.gain.setValueAtTime(0.5, ctx.currentTime);
      g3.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      osc2.start(ctx.currentTime); osc2.stop(ctx.currentTime + 0.4);
    } else if (type === 'deathbox') {
      // Epic ascending fanfare
      [220,277,330,440,554].forEach((freq,i) => {
        const osc = ctx.createOscillator();
        const g2 = ctx.createGain();
        osc.connect(g2); g2.connect(ctx.destination);
        osc.type = 'triangle';
        osc.frequency.value = freq;
        g2.gain.setValueAtTime(0.0, ctx.currentTime + i*0.1);
        g2.gain.linearRampToValueAtTime(0.2, ctx.currentTime + i*0.1 + 0.08);
        g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.1 + 0.7);
        osc.start(ctx.currentTime + i*0.1);
        osc.stop(ctx.currentTime + i*0.1 + 0.8);
      });
    }
  } catch(e) {}
}

// ─── ENGINE ───────────────────────────────────────────────────────────────────
function randTileCount() {
  return [2,3,4,5,6,6][Math.floor(Math.random()*6)];
}

function generateRow(rowIdx) {
  const n = randTileCount();
  const bombs = new Set();
  while(bombs.size < BOMB_MAP[n]) bombs.add(Math.floor(Math.random()*n));
  return {
    id: rowIdx,
    tiles: Array.from({length:n},(_,i)=>({id:i,isBomb:bombs.has(i),state:'hidden'})),
    isActive: rowIdx===0,
    isCompleted: false,
    payout: PAYOUTS[rowIdx+1]||820,
  };
}

function generateRun() {
  return {
    id: Date.now().toString(),
    rows: Array.from({length:8},(_,i)=>generateRow(i)),
    currentRow: 0,
    status: 'active',
    secured: BASE_PTS,
    reachedBox: false,
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  } catch(e){}
  return {points:0,runs:0,wins:0,best:0,history:[],rewards:REWARDS_INIT};
}

function saveState(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch(e){}
}

// ─── TILE ─────────────────────────────────────────────────────────────────────
function TileCell({tile, active, onClick, sz}) {
  const safe = tile.state==='safe';
  const bomb = tile.state==='bomb';
  const hidden = tile.state==='hidden';
  return (
    <button
      className="tile-btn"
      onClick={active && hidden ? onClick : undefined}
      disabled={!active || !hidden}
      style={{
        width:sz, height:sz, minWidth:sz, minHeight:sz,
        border: bomb ? '2px solid #CC0000' : safe ? '2px solid #3aaa3a' : active ? '2px solid #3e4455' : '2px solid #252830',
        borderRadius:4,
        background: bomb ? 'rgba(204,0,0,0.25)' : safe ? 'rgba(42,160,42,0.2)' : active ? '#22252e' : '#191c23',
        display:'flex', alignItems:'center', justifyContent:'center',
        boxShadow: bomb ? '0 0 16px rgba(204,0,0,0.6)' : safe ? '0 0 10px rgba(60,200,60,0.35)' : 'none',
        animation: bomb ? 'bombShake 0.45s ease' : safe ? 'safeReveal 0.25s ease' : 'none',
        position:'relative', padding:0, flexShrink:0,
      }}
    >
      {bomb ? (
        <img src={SKULL_IMG} alt="x" style={{width:sz*0.6,height:sz*0.6,objectFit:'contain',filter:'brightness(0) saturate(100%) invert(30%) sepia(90%) saturate(800%) hue-rotate(340deg) brightness(120%)'}}/>
      ) : safe ? (
        <span style={{fontSize:sz*0.38,color:'#5ddd5d',fontWeight:700,lineHeight:1}}>✓</span>
      ) : active ? (
        <span style={{width:sz*0.14,height:sz*0.14,borderRadius:'50%',background:'#3e4455',display:'block'}}/>
      ) : ''}
    </button>
  );
}

// ─── ROW ──────────────────────────────────────────────────────────────────────
function GameRow({row, onTileClick, rowNum, isDeathBox, sz}) {
  return (
    <div style={{
      display:'flex', alignItems:'center', gap:6, flexShrink:0,
      height:sz, overflow:'hidden',
      opacity: row.isActive ? 1 : row.isCompleted ? 0.65 : 0.35,
      transition:'opacity 0.3s',
    }}>
      <div style={{width:34,textAlign:'right',flexShrink:0}}>
        {isDeathBox ? (
          <span style={{color:'#D4AF37',fontSize:7,fontWeight:700,lineHeight:1.2}}>DEATH{String.fromCharCode(10)}BOX</span>
        ) : (
          <>
            <div style={{fontSize:7,color:row.isActive?'#ff4444':'#666',fontWeight:700}}>R{rowNum}</div>
            <div style={{fontSize:8,color:row.isActive?'#fff':'#555',fontWeight:600}}>{row.payout}</div>
          </>
        )}
      </div>
      <div style={{
        width:3, height:sz*0.75, borderRadius:2, flexShrink:0,
        background: row.isActive ? '#CC0000' : row.isCompleted ? '#3aaa3a' : '#2e3240',
        boxShadow: row.isActive ? '0 0 8px #CC0000' : 'none',
        transition:'all 0.3s',
      }}/>
      <div style={{display:'flex',gap:4,flexWrap:'nowrap',alignItems:'center'}}>
        {isDeathBox ? (
          <div className={row.isCompleted ? 'death-box-glow' : ''} style={{
            width:sz*3, height:sz*0.82,
            border:`2px solid ${row.isCompleted?'#D4AF37':'#2e3240'}`,
            borderRadius:4,background:row.isCompleted?'rgba(212,175,55,0.12)':'rgba(212,175,55,0.04)',
            display:'flex',alignItems:'center',justifyContent:'center',
            color:row.isCompleted?'#D4AF37':'#555',fontSize:9,fontWeight:700,letterSpacing:2,
          }}>
            ☠ DEATH BOX
          </div>
        ) : (
          row.tiles.map(tile => (
            <TileCell key={tile.id} tile={tile} active={row.isActive} onClick={()=>onTileClick(tile.id)} sz={sz*0.82}/>
          ))
        )}
      </div>
    </div>
  );
}

// ─── DEATH OVERLAY ────────────────────────────────────────────────────────────
function DeathBoxOverlay({onClose}) {
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.95)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',animation:'fadeIn 0.5s ease'}}>
      <div style={{textAlign:'center',padding:48,maxWidth:500}}>
        <img src={SKULL_IMG} alt="skull" style={{width:140,height:'auto',marginBottom:8,animation:'deathReveal 0.6s ease',filter:'brightness(0) saturate(100%) invert(78%) sepia(47%) saturate(600%) hue-rotate(5deg) brightness(105%)'}}/>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:64,color:'#D4AF37',letterSpacing:6,marginTop:8}}>DEATH BOX</div>
        <div style={{color:'#b8c0d0',fontSize:11,letterSpacing:3,marginTop:12}}>YOU ARE ONE OF THE FEW WHO SURVIVED</div>
        <div style={{fontSize:11,color:'#a0a8b8',marginTop:6,letterSpacing:2}}>A physical reward will be dispatched to you</div>
        <div style={{color:'#D4AF37',fontFamily:"'Bebas Neue',sans-serif",fontSize:48,letterSpacing:2,marginTop:28}}>+820 PTS</div>
        <button className="btn-red" onClick={onClose} style={{marginTop:36,padding:'14px 56px',background:'#CC0000',border:'none',color:'#fff',fontSize:12,letterSpacing:3,fontFamily:'inherit',borderRadius:4,cursor:'pointer',fontFamily:"'Bebas Neue',sans-serif"}}>
          CLAIM
        </button>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [pState, setPState] = useState(loadState);
  const [run, setRun] = useState(null);
  const [tab, setTab] = useState('game');
  const [showBox, setShowBox] = useState(false);
  const boardRef = useRef(null);
  const [, forceUpdate] = useState(0);
  useEffect(()=>{
    const onResize = ()=>forceUpdate(n=>n+1);
    window.addEventListener('resize', onResize);
    return ()=>window.removeEventListener('resize', onResize);
  },[]);

  useEffect(()=>saveState(pState),[pState]);

  const startRun = useCallback(()=>{
    setRun(generateRun());
    setShowBox(false);
    setTab('game');
    setTimeout(()=>{
      const el = boardRef.current;
      if(el) el.scrollTop = el.scrollHeight;
    }, 150);
  },[]);

  const clickTile = useCallback((rowIdx, tileId)=>{
    setRun(prev=>{
      if(!prev || prev.status!=='active') return prev;
      if(rowIdx!==prev.currentRow) return prev;

      const rows = prev.rows.map((row,ri)=>{
        if(ri!==rowIdx) return row;
        return {...row, tiles:row.tiles.map(t=>t.id===tileId?{...t,state:t.isBomb?'bomb':'safe'}:t)};
      });
      const hit = rows[rowIdx].tiles.find(t=>t.id===tileId);

      if(hit.isBomb) {
        playSound('bomb');
        const dead = rows.map((row,ri)=>ri===rowIdx?{...row,isActive:false,tiles:row.tiles.map(t=>({...t,state:t.isBomb?'bomb':t.state}))}:row);
        setPState(p=>{
          const h=[{id:Date.now().toString(),result:'bomb',pts:0,row:rowIdx,ts:Date.now()},...p.history].slice(0,50);
          const n={...p,runs:p.runs+1,history:h};
          saveState(n);return n;
        });
        return{...prev,rows:dead,status:'dead'};
      }

      playSound('safe');
      const isLast = rowIdx===7;
      if(isLast) {
        playSound('deathbox');
        const done = rows.map(row=>({...row,isActive:false,isCompleted:true}));
        setShowBox(true);
        setPState(p=>{
          const h=[{id:Date.now().toString(),result:'death_box',pts:820,row:8,ts:Date.now()},...p.history].slice(0,50);
          const n={...p,points:p.points+820,runs:p.runs+1,wins:p.wins+1,best:Math.max(p.best,8),history:h};
          saveState(n);return n;
        });
        return{...prev,rows:done,currentRow:8,status:'cashed_out',secured:820,reachedBox:true};
      }

      const next = rows.map((row,ri)=>({...row,isActive:ri===rowIdx+1,isCompleted:ri===rowIdx?true:row.isCompleted}));
      return{...prev,rows:next,currentRow:rowIdx+1,secured:PAYOUTS[rowIdx+1]};
    });
  },[]);

  const cashOut = useCallback(()=>{
    setRun(prev=>{
      if(!prev||prev.status!=='active'||prev.currentRow===0) return prev;
      playSound('cashout');
      const pts = PAYOUTS[prev.currentRow];
      setPState(p=>{
        const h=[{id:Date.now().toString(),result:'cashout',pts,row:prev.currentRow,ts:Date.now()},...p.history].slice(0,50);
        const n={...p,points:p.points+pts,runs:p.runs+1,wins:p.wins+1,best:Math.max(p.best,prev.currentRow),history:h};
        saveState(n);return n;
      });
      return{...prev,status:'cashed_out',secured:pts};
    });
  },[]);

  const redeemReward = useCallback((id)=>{
    setPState(p=>{
      const r = p.rewards.find(r=>r.id===id);
      if(!r||r.redeemed||p.points<r.cost) return p;
      const n={...p,points:p.points-r.cost,rewards:p.rewards.map(rw=>rw.id===id?{...rw,redeemed:true}:rw)};
      saveState(n);return n;
    });
  },[]);

  const reset = useCallback(()=>{
    const fresh={points:0,runs:0,wins:0,best:0,history:[],rewards:REWARDS_INIT};
    setPState(fresh);saveState(fresh);setRun(null);
  },[]);

  const isActive = run?.status==='active';
  const isDead   = run?.status==='dead';
  const isCashed = run?.status==='cashed_out';
  const canCash  = isActive && (run?.currentRow||0)>0;
  const nextPayout = run ? (PAYOUTS[run.currentRow+1]||820) : 0;
  const nowPayout  = run ? PAYOUTS[run.currentRow] : 0;

  return (
    <div style={{minHeight:'100vh',background:'#13151a'}}>
      {showBox && <DeathBoxOverlay onClose={()=>setShowBox(false)}/>}

      {/* TOP BAR */}
      <header style={{height:54,borderBottom:'1px solid #2a2d36',display:'flex',alignItems:'center',padding:'0 16px',gap:16,position:'sticky',top:0,background:'#13151a',zIndex:40}}>
        <img src={DTT_LOGO} alt="Death To Tennis" style={{height:28,width:'auto',flexShrink:0,objectFit:'contain'}}/>
        <div style={{width:1,height:24,background:'#252830',flexShrink:0}}/>
        <div className="header-nav" style={{display:'flex',gap:16,alignItems:'center'}}>
        {['game','shop','leaderboard','history'].map(t=>(
          <button key={t} className="nav-item" onClick={()=>setTab(t)} style={{color:tab===t?'#ff5555':'#9098aa',fontSize:9,letterSpacing:2,fontFamily:'inherit',paddingBottom:3,borderBottom:tab===t?'1px solid #CC0000':'1px solid transparent',fontWeight:tab===t?600:400}}>
            {t.toUpperCase()}
          </button>
        ))}
        </div>
        {/* Mobile tab icons */}
        <div style={{display:'none'}} className="mobile-tabs">
          {[['game','⚡'],['shop','🏷'],['lb','🏆'],['hist','📋']].map(([t,icon],i)=>{
            const tabs=['game','shop','leaderboard','history'];
            return <button key={t} onClick={()=>setTab(tabs[i])} style={{background:'none',border:'none',color:tab===tabs[i]?'#ff5555':'#666',fontSize:16,cursor:'pointer',padding:'4px 6px'}}>{icon}</button>
          })}
        </div>
        <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:16}}>
          <div>
            <div style={{fontSize:7,color:'#9098aa',letterSpacing:2}}>BALANCE</div>
            <div className="header-mobile-pts" style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:16,color:'#D4AF37',letterSpacing:1}}>{pState.points.toLocaleString()} PTS</div>
          </div>
          <div style={{width:1,height:28,background:'#252830'}}/>
          <div>
            <div style={{fontSize:7,color:'#9098aa',letterSpacing:2}}>RUNS</div>
            <div style={{fontSize:12,color:'#b0b8c8'}}>{pState.runs}</div>
          </div>
        </div>
      </header>

      {/* GAME TAB */}
      {tab==='game' && (
        <div style={{display:'flex',flexDirection:'column',height:'calc(100vh - 54px)',overflow:'hidden'}}>
        {/* ACTION BAR — shown on mobile below header */}
        <div className="mobile-action-bar" style={{display:'none',alignItems:'center',gap:12,padding:'8px 16px',borderBottom:'1px solid #2a2d36',background:'#13151a',flexShrink:0}}>
          <div style={{flex:1}}>
            <div style={{fontSize:7,color:'#9098aa',letterSpacing:2}}>
              {isActive ? `ROW ${(run?.currentRow||0)+1} / 8` : isDead ? 'ELIMINATED' : isCashed ? 'SECURED' : 'READY'}
            </div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,color:isActive?'#fff':isDead?'#ff5555':'#4dc94d',letterSpacing:1}}>
              {isActive ? `${nextPayout} PTS` : (run?.secured||0) > 0 ? `+${run.secured} PTS` : '—'}
            </div>
          </div>
          {!run || isDead || isCashed ? (
            <button className="btn-red" onClick={startRun} style={{padding:'10px 24px',background:'#CC0000',border:'none',color:'#fff',fontSize:11,letterSpacing:3,fontFamily:"'Bebas Neue',sans-serif",borderRadius:4,cursor:'pointer',flexShrink:0}}>
              {!run ? 'START' : 'NEW RUN'}
            </button>
          ) : (
            <button className="btn-gold" onClick={cashOut} disabled={!canCash} style={{padding:'10px 24px',background:canCash?'#D4AF37':'#1e2230',border:`1px solid ${canCash?'#D4AF37':'#2e3240'}`,color:canCash?'#000':'#5a6070',fontSize:11,letterSpacing:3,fontFamily:"'Bebas Neue',sans-serif",borderRadius:4,cursor:canCash?'pointer':'not-allowed',flexShrink:0}}>
              CASH OUT
            </button>
          )}
        </div>
        <div className="game-layout" style={{display:'flex',flex:1,overflow:'hidden',minHeight:0}}>

          {/* LEFT SIDEBAR — hidden on mobile */}
          <aside className="desktop-sidebar" style={{width:180,borderRight:'1px solid #252830',padding:18,display:'flex',flexDirection:'column',gap:16,flexShrink:0,overflowY:'auto'}}>
            <div>
              <div style={{fontSize:9,color:'#a0a8b8',letterSpacing:2,marginBottom:10}}>STATS</div>
              {[{l:'BEST ROW',v:pState.best||'—'},{l:'WINS',v:pState.wins},{l:'WIN RATE',v:pState.runs?Math.round(pState.wins/pState.runs*100)+'%':'—'}].map(s=>(
                <div key={s.l} style={{marginBottom:14}}>
                  <div style={{fontSize:9,color:'#9098aa',letterSpacing:1}}>{s.l}</div>
                  <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:'#a0a8b8',letterSpacing:1}}>{s.v}</div>
                </div>
              ))}
            </div>
            <div>
              <div style={{fontSize:9,color:'#a0a8b8',letterSpacing:2,marginBottom:8}}>PAYOUT LADDER</div>
              {PAYOUTS.slice(1).map((p,i)=>(
                <div key={i} style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                  <span style={{fontSize:8,color: run&&i<run.currentRow?'#4dc94d': run&&i===run.currentRow?'#ff5555':'#9098aa'}}>{i===7?'ROW 8':`ROW ${i+1}`}</span>
                  <span style={{fontSize:9,color: i===7?'#D4AF37': run&&i<run.currentRow?'#4dc94d': run&&i===run.currentRow?'#ffffff':'#a0a8b8',fontWeight:i===7?700:400}}>{p}</span>
                </div>
              ))}
              <div style={{display:'flex',justifyContent:'space-between',marginTop:4,paddingTop:4,borderTop:'1px solid #111'}}>
                <span style={{fontSize:8,color:'#D4AF37'}}>ROW 9</span>
                <span style={{fontSize:8,color:'#D4AF37'}}>☠ BOX</span>
              </div>
            </div>
            <button onClick={reset} style={{marginTop:'auto',padding:'7px',background:'none',border:'1px solid #2a2d36',color:'#8a8f9e',fontSize:8,letterSpacing:2,borderRadius:3,fontFamily:'inherit',cursor:'pointer',transition:'all 0.15s'}}
              onMouseEnter={e=>{e.target.style.borderColor='#333';e.target.style.color='#444'}}
              onMouseLeave={e=>{e.target.style.borderColor='#141414';e.target.style.color='#222'}}>
              RESET DATA
            </button>
          </aside>

          {/* CENTER BOARD */}
          <main ref={boardRef} className="main-board" style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',overflow:'hidden',minHeight:0}}>
            {!run && (
              <div style={{textAlign:'center',margin:'auto',padding:'40px 16px',animation:'fadeIn 0.4s ease'}}>
                <img src={SKULL_IMG} alt="skull" style={{width:120,height:'auto',marginBottom:8,opacity:0.85,display:'block',marginLeft:'auto',marginRight:'auto'}}/>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:42,letterSpacing:5,marginBottom:6}}>THE FINAL VISION</div>
                <div style={{color:'#9098aa',fontSize:10,letterSpacing:3,marginBottom:12}}>SURVIVE 9 ROWS</div>
                <div style={{color:'#CC0000',fontSize:10,letterSpacing:2,marginBottom:40}}>CLAIM THE DEATH BOX</div>
                <button className="btn-red" onClick={startRun} style={{padding:'15px 60px',background:'#CC0000',border:'none',color:'#fff',fontSize:14,letterSpacing:4,fontFamily:"'Bebas Neue',sans-serif",borderRadius:4,cursor:'pointer'}}>
                  START RUN
                </button>
              </div>
            )}

            {run && (() => {
              // Calculate tile size so all 9 rows fit perfectly
              const actionBarH = window.innerWidth <= 700 ? 54 : 0;
              const availH = (boardRef.current ? boardRef.current.clientHeight : window.innerHeight - 108) - actionBarH - (isDead||isCashed ? 44 : 0) - 16;
              const sz = Math.floor(availH / 9);
              return (
                <div style={{width:'100%',maxWidth:560,display:'flex',flexDirection:'column',height:'100%',padding:'8px 12px',boxSizing:'border-box'}}>
                  {/* Status banner */}
                  {(isDead||isCashed) && (
                    <div style={{marginBottom:6,padding:'8px 14px',background:isDead?'rgba(204,0,0,0.12)':'rgba(60,160,60,0.12)',border:`1px solid ${isDead?'rgba(204,0,0,0.5)':'rgba(60,160,60,0.5)'}`,borderRadius:4,display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
                      <div style={{fontSize:10,color:isDead?'#ff5555':'#4dc94d',letterSpacing:1,fontWeight:600}}>
                        {isDead ? '💀 BOMB HIT — RUN OVER' : run.reachedBox ? '☠ DEATH BOX CLAIMED' : `✓ CASHED OUT — +${run.secured} PTS`}
                      </div>
                      <button className="btn-red" onClick={startRun} style={{padding:'5px 14px',background:'#CC0000',border:'none',color:'#fff',fontSize:9,letterSpacing:2,fontFamily:'inherit',borderRadius:3,cursor:'pointer'}}>NEW RUN</button>
                    </div>
                  )}
                  {/* Board rows — Death Box top, Row 1 bottom, no scroll */}
                  <div style={{display:'flex',flexDirection:'column',flex:1,justifyContent:'space-evenly'}}>
                    <GameRow
                      row={{id:9,tiles:[],isActive:false,isCompleted:run.reachedBox,payout:820}}
                      onTileClick={()=>{}} rowNum={9} isDeathBox={true} sz={sz}
                    />
                    {[...run.rows].reverse().map(row=>(
                      <GameRow key={row.id} row={row} onTileClick={tid=>clickTile(row.id,tid)} rowNum={row.id+1} isDeathBox={false} sz={sz}/>
                    ))}
                  </div>
                </div>
              );
            })()}
          </main>

          {/* RIGHT PANEL — hidden on mobile */}
          <aside className="desktop-sidebar" style={{width:210,borderLeft:'1px solid #252830',padding:18,display:'flex',flexDirection:'column',gap:14,flexShrink:0,overflowY:'auto'}}>
            <div>
              <div style={{fontSize:9,color:'#a0a8b8',letterSpacing:2,marginBottom:12}}>CURRENT RUN</div>
              <div style={{marginBottom:10}}>
                <div style={{fontSize:9,color:'#9098aa',letterSpacing:1}}>STATUS</div>
                <div style={{fontSize:11,letterSpacing:1,fontWeight:600,color:!run?'#7a8090':isActive?'#ff5555':isDead?'#ff5555':'#4dc94d',marginTop:2}}>
                  {!run?'IDLE':isActive?`ROW ${run.currentRow+1} / 8`:isDead?'ELIMINATED':'SECURED'}
                </div>
              </div>
              {isActive && (
                <>
                  <div style={{marginBottom:10}}>
                    <div style={{fontSize:9,color:'#9098aa',letterSpacing:1}}>NEXT PAYOUT</div>
                    <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:32,color:'#fff',letterSpacing:1,lineHeight:1}}>
                      {nextPayout}<span style={{fontSize:11,color:'#9098aa',marginLeft:3}}>PTS</span>
                    </div>
                  </div>
                  {run.currentRow>0 && (
                    <div style={{marginBottom:10,padding:'8px 10px',background:'rgba(212,175,55,0.06)',border:'1px solid rgba(212,175,55,0.15)',borderRadius:3}}>
                      <div style={{fontSize:8,color:'#D4AF37',letterSpacing:1}}>CASH OUT NOW</div>
                      <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,color:'#D4AF37',letterSpacing:1}}>+{nowPayout} PTS</div>
                    </div>
                  )}
                </>
              )}
              {(isDead||isCashed) && run && (
                <div style={{marginBottom:10}}>
                  <div style={{fontSize:9,color:'#9098aa',letterSpacing:1}}>SECURED</div>
                  <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color:isDead?'#888':'#D4AF37',letterSpacing:1}}>{isDead?'0':run.secured} PTS</div>
                </div>
              )}
            </div>

            {/* Buttons */}
            <button className="btn-gold" onClick={cashOut} disabled={!canCash} style={{padding:'13px',background:canCash?'#D4AF37':'#1e2230',border:`1px solid ${canCash?'#D4AF37':'#2e3240'}`,color:canCash?'#000':'#5a6070',fontSize:12,letterSpacing:3,fontFamily:"'Bebas Neue',sans-serif",borderRadius:4,cursor:canCash?'pointer':'not-allowed',fontWeight:700}}>
              CASH OUT
            </button>
            {!run && (
              <button className="btn-red" onClick={startRun} style={{padding:'13px',background:'#CC0000',border:'none',color:'#fff',fontSize:12,letterSpacing:3,fontFamily:"'Bebas Neue',sans-serif",borderRadius:4,cursor:'pointer'}}>
                START RUN
              </button>
            )}
            {(isDead||isCashed) && (
              <button className="btn-red" onClick={startRun} style={{padding:'13px',background:'#CC0000',border:'none',color:'#fff',fontSize:12,letterSpacing:3,fontFamily:"'Bebas Neue',sans-serif",borderRadius:4,cursor:'pointer'}}>
                NEW RUN
              </button>
            )}

            {/* History */}
            <div style={{marginTop:4}}>
              <div style={{fontSize:9,color:'#a0a8b8',letterSpacing:2,marginBottom:8}}>RECENT</div>
              {pState.history.length===0 && <div style={{fontSize:9,color:'#9098aa'}}>No runs yet</div>}
              {pState.history.slice(0,7).map(e=>(
                <div key={e.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:7,paddingBottom:7,borderBottom:'1px solid #252830'}}>
                  <div>
                    <div style={{fontSize:9,color:e.result==='bomb'?'#ff5555':e.result==='death_box'?'#D4AF37':'#4dc94d',letterSpacing:1}}>
                      {e.result==='bomb'?'💀 DEAD':e.result==='death_box'?'☠ BOX':'✓ OUT'}
                    </div>
                    <div style={{fontSize:8,color:'#8a8f9e'}}>ROW {e.row}</div>
                  </div>
                  <div style={{fontSize:11,fontFamily:"'Bebas Neue',sans-serif",color:e.pts>0?'#D4AF37':'#606878',letterSpacing:1}}>{e.pts>0?`+${e.pts}`:'—'}</div>
                </div>
              ))}
            </div>
          </aside>
        </div>
        </div>
      )}

      {/* SHOP TAB */}
      {tab==='shop' && (
        <div style={{padding:'32px 40px',maxWidth:1000,margin:'0 auto',animation:'fadeIn 0.3s ease'}}>
          <div style={{marginBottom:28}}>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:44,letterSpacing:5}}>REWARD SHOP</div>
            <div style={{color:'#c0c8d4',fontSize:11,letterSpacing:2,marginTop:4}}>Redeem points for exclusive Death To Tennis pieces</div>
            <div style={{marginTop:10,display:'inline-flex',alignItems:'center',gap:10,padding:'6px 16px',background:'#1e2230',border:'1px solid #2a2d36',borderRadius:4}}>
              <span style={{fontSize:9,color:'#a0aab8',letterSpacing:2}}>YOUR BALANCE</span>
              <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,color:'#D4AF37',letterSpacing:1}}>{pState.points.toLocaleString()} PTS</span>
            </div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14}} className="shop-grid">
            {pState.rewards.map(r=>{
              const can = pState.points>=r.cost && !r.redeemed;
              const tc = r.tier===3?'#D4AF37':r.tier===2?'#CC7722':'#666';
              const tierLabel = r.tier===3?'RARE':r.tier===2?'UNCOMMON':'STANDARD';
              return (
                <div key={r.id} className="reward-card" style={{border:'1px solid #2a2d36',borderRadius:5,background:'#191c24',overflow:'hidden',opacity:r.redeemed?0.4:1,transition:'all 0.15s'}}>
                  <div className="card-image" style={{height:160,background:'#1e2230',borderBottom:'1px solid #2a2d36',display:'flex',alignItems:'center',justifyContent:'center',position:'relative'}}>
                    <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:48,color:'#8a9090',letterSpacing:3}}>DTT</div>
                    <div style={{position:'absolute',top:10,right:10,padding:'3px 8px',background:tc,borderRadius:2,fontSize:7,fontWeight:700,color:r.tier===3?'#000':'#fff',letterSpacing:1}}>{tierLabel}</div>
                    {r.redeemed && <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.75)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,letterSpacing:2,color:'#4dc94d'}}>✓ REDEEMED</div>}
                  </div>
                  <div className="card-body" style={{padding:14}}>
                    <div style={{fontSize:12,fontWeight:500,marginBottom:3}}>{r.title}</div>
                    <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:tc,letterSpacing:1,marginBottom:12}}>{r.cost.toLocaleString()} PTS</div>
                    <button onClick={()=>redeemReward(r.id)} disabled={!can} style={{width:'100%',padding:'9px',background:can?'#CC0000':'#1e2230',border:`1px solid ${can?'#CC0000':'#2e3240'}`,color:can?'#fff':'#5a6070',fontSize:9,letterSpacing:2,fontFamily:'inherit',borderRadius:3,cursor:can?'pointer':'not-allowed',transition:'all 0.15s'}}
                      onMouseEnter={e=>{if(can)e.target.style.background='#e60000'}}
                      onMouseLeave={e=>{if(can)e.target.style.background='#CC0000'}}>
                      {r.redeemed?'REDEEMED':can?'REDEEM':`NEED ${(r.cost-pState.points).toLocaleString()} MORE`}
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* LEADERBOARD TAB */}
      {tab==='leaderboard' && (
        <div style={{padding:'32px 40px',maxWidth:680,margin:'0 auto',animation:'fadeIn 0.3s ease'}}>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:44,letterSpacing:5,marginBottom:6}}>LEADERBOARD</div>
          <div style={{color:'#c0c8d4',fontSize:11,letterSpacing:2,marginBottom:24}}>Global rankings</div>
          <div style={{border:'1px solid #2a2d36',borderRadius:5,overflow:'hidden'}}>
            <div style={{display:'grid',gridTemplateColumns:'44px 1fr 110px 70px 70px',padding:'10px 18px',background:'#1e2230',borderBottom:'1px solid #2a2d36'}}>
              {['#','PLAYER','POINTS','BEST','RUNS'].map(h=><div key={h} style={{fontSize:9,color:'#a0a8b8',letterSpacing:2}}>{h}</div>)}
            </div>
            {[...LEADERBOARD,{rank:LEADERBOARD.length+1,name:'YOU',points:pState.points,best:pState.best,runs:pState.runs,isYou:true}]
              .sort((a,b)=>b.points-a.points)
              .map((e,i)=>{
                const isYou = e.isYou||e.name==='YOU';
                const rc = i===0?'#D4AF37':i===1?'#888':i===2?'#CC7722':'#333';
                return (
                  <div key={e.name+i} className="lb-row" style={{display:'grid',gridTemplateColumns:'44px 1fr 110px 70px 70px',padding:'13px 18px',borderBottom:'1px solid #252830',background:isYou?'rgba(204,0,0,0.08)':'transparent',transition:'background 0.15s'}}>
                    <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:16,color:rc}}>{i+1}</div>
                    <div style={{fontSize:11,color:isYou?'#ff5555':'#c4ccd8',fontWeight:isYou?700:400,letterSpacing:isYou?1:0}}>{isYou?'YOU ←':e.name}</div>
                    <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:14,color:'#D4AF37',letterSpacing:1}}>{(isYou?pState.points:e.points).toLocaleString()}</div>
                    <div style={{fontSize:10,color:'#b0b8c8'}}>{isYou?pState.best:e.best}</div>
                    <div style={{fontSize:10,color:'#b0b8c8'}}>{isYou?pState.runs:e.runs}</div>
                  </div>
                );
              })}
          </div>
        </div>
      )}

      {/* HISTORY TAB */}
      {tab==='history' && (
        <div style={{padding:'32px 40px',maxWidth:680,margin:'0 auto',animation:'fadeIn 0.3s ease'}}>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:44,letterSpacing:5,marginBottom:6}}>RUN HISTORY</div>
          <div style={{color:'#c0c8d4',fontSize:11,letterSpacing:2,marginBottom:24}}>Your last {pState.history.length} runs</div>
          {pState.history.length===0 && (
            <div style={{textAlign:'center',padding:80,color:'#8a9090',fontSize:12,letterSpacing:3}}>NO RUNS YET</div>
          )}
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {pState.history.map((e,i)=>(
              <div key={e.id} style={{display:'grid',gridTemplateColumns:'1fr 90px 90px 110px',alignItems:'center',padding:'13px 18px',background:'#1e2230',border:'1px solid #2a2d36',borderRadius:4,animation:`fadeIn 0.3s ease ${i*0.03}s both`}}>
                <div>
                  <div style={{fontSize:10,color:e.result==='bomb'?'#ff5555':e.result==='death_box'?'#D4AF37':'#4dc94d',letterSpacing:1,fontWeight:600}}>
                    {e.result==='bomb'?'💀 ELIMINATED':e.result==='death_box'?'☠ DEATH BOX':'✓ CASHED OUT'}
                  </div>
                  <div style={{fontSize:8,color:'#8a8f9e',marginTop:2}}>{new Date(e.ts).toLocaleString()}</div>
                </div>
                <div style={{fontSize:9,color:'#a0a8b8',letterSpacing:1}}>ROW {e.row}</div>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:16,color:e.pts>0?'#D4AF37':'#606878',letterSpacing:1}}>{e.pts>0?`+${e.pts}`:'—'}</div>
                <div style={{fontSize:8,color:'#8a8f9e',letterSpacing:1,textAlign:'right'}}>{e.result==='bomb'?'LOST RUN':'SECURED'}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      <div style={{position:'fixed',bottom:0,left:0,right:0,height:3,background:'linear-gradient(90deg,transparent,#CC0000 30%,#CC0000 70%,transparent)',zIndex:50}}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
